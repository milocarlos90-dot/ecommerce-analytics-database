version: 2

models:
  - name: int_orders_enriched
    description: >
      Enriched orders model with standardized timestamps and lifecycle flags
      derived from order status.

    columns:

      - name: order_id
        description: Primary key for the order.
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: Identifier of the customer who placed the order.
        data_tests:
          - not_null

      - name: status
        description: Current lifecycle status of the order.

      - name: order_created_at
        description: Timestamp when the order was created.

      - name: order_created_date
        description: Date portion of order_created_at for analytics use.

      - name: is_completed_order
        description: True if order status is Complete.

      - name: is_cancelled_order
        description: True if order status is Cancelled.

      - name: is_returned_order
        description: True if order status is Returned.

      - name: is_shipped_order
        description: True if order status is Shipped.

      - name: is_processing_order
        description: True if order status is Processing.