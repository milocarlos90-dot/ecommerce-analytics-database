version: 2

models:
  - name: int_events_sessionized
    description: >
      Intermediate model assigning analytics sessions to events using a
      30-minute inactivity rule. Each row represents one event enriched
      with both journey sessions (source-defined) and analytics sessions
      (behaviorally derived).

    columns:

      - name: event_id
        description: Unique identifier for each event.
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: Customer performing the event.

      - name: event_ts
        description: Timestamp used for chronological ordering and sessionization.
        data_tests:
          - not_null

      - name: journey_session_id
        description: >
          Source-generated session identifier representing a single browsing
          visit captured by the application tracking system. Exists for both
          anonymous and identified users and is used as the primary session
          definition for behavioral and session analytics.
        data_tests:
          - not_null

      - name: customer_session_number
        description: >
          Sequential session counter per identified customer derived from
          inactivity gaps (30-minute timeout). Increments whenever a new
          customer session begins and is only populated for records with a
          valid customer_id.
        data_tests:
          - not_null

      - name: customer_session_id
        description: >
          Surrogate key uniquely identifying a reconstructed customer session.
          Generated using dbt_utils.generate_surrogate_key from customer_id
          and customer_session_number. Represents customer-level session
          continuity independent of the source journey session.
        data_tests:
          - not_null

      - name: previous_event_ts
        description: Timestamp of the previous event for the same customer.

      - name: new_session_flag
        description: >
          Indicator marking the start of a new analytics session
          (1 = new session, 0 = continuation).